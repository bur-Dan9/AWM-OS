<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWM OS — AI Маркетинг будущего | Регистрация в лист ожидания</title>
  <link rel="icon" href="public/logo-awm.png" type="image/png">
  <meta name="description"
    content="Автоматизация маркетинга с помощью 10 AI-ассистентов. Запишитесь в лист ожидания до официального старта">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- ===== ТВОИ СТИЛИ (без изменений) ===== -->
  <style>
    /* ... ТВОЙ ОГРОМНЫЙ CSS БЛОК ... */
  </style>

  <style>
    /* ... ТВОЙ ВТОРОЙ CSS БЛОК ... */
  </style>
</head>

<body x-data="{ scrolled: false, menuOpen: false }"
  x-init="$watch('menuOpen', val => document.body.style.overflow = val ? 'hidden' : '')"
  @scroll.window="scrolled = (window.pageYOffset > 20)" class="loading">

  <!-- ═══ PRELOADER ═══ -->
  <div id="preloader">
    <div class="loader-content">
      <img src="public/logo-awm.png" alt="AWM OS Logo" class="loader-logo">
      <div class="loader-text">INITIALIZING AWM OS...</div>
      <div class="loader-bar-container">
        <div id="loader-progress" class="loader-bar"></div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const preloader = document.getElementById('preloader');
      const bar = document.getElementById('loader-progress');
      let progress = 0;

      const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          setTimeout(() => {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.classList.remove('loading');
          }, 800);
        }
        bar.style.width = progress + '%';
      }, 150);
    });
  </script>

  <div class="aurora-bg"></div>
  <div class="aurora-sweep"></div>

  <main class="site-wrapper">

    <!-- ===== ТВОЙ КОНТЕНТ САЙТА (без изменений) ===== -->
    <!-- ... весь контент ... -->

    <!-- GLOBAL MODAL OVERLAY -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
      <section class="waitlist-section glass-card">
        <button id="closeModal" class="close-btn" type="button">×</button>

        <h2>WAITLIST</h2>

        <div class="warning-box">
          <span>⚠️</span>
          <p>
            Статус: Финальная стадия разработки. Проект находится на стадии развертывания.
            На данный момент мы принимаем заявки на включение в список раннего доступа.
            Оставьте ваши данные, и мы сообщим вам о запуске системы.
          </p>
        </div>

        <form id="waitlistForm">
          <div id="waitlistContent">
            <div class="form-group">
              <input id="leadName" type="text" placeholder="Ваше имя" required>
            </div>
            <div class="form-group">
              <input id="leadNiche" type="text" placeholder="Ниша вашего бизнеса (для Соффи)" required>
            </div>
            <div class="form-group">
              <input id="leadContact" type="text" placeholder="Telegram @username или телефон" required>
            </div>

            <button id="leadSubmit" type="submit" class="btn btn-main btn-block">
              СООБЩИТЬ МНЕ О ЗАПУСКЕ
            </button>

            <div id="leadStatus" style="margin-top:10px; text-align:center; opacity:0.85;"></div>

            <a id="leadDeeplink" href="#" target="_blank"
              style="display:none; margin-top:12px; text-align:center; font-weight:700;">
              Открыть бота в Telegram
            </a>
          </div>
        </form>
      </section>
    </div>

  </main>

  <!-- ✅ ГОТОВЫЙ СКРИПТ (исправленный) -->
  <script>
    (() => {
      const API = "https://ai-bot-a3aj.onrender.com/api/leads/website";

      const modalOverlay = document.getElementById("modalOverlay");
      const closeModalBtn = document.getElementById("closeModal");

      const form = document.getElementById("waitlistForm");
      const submitBtn = document.getElementById("leadSubmit");
      const statusEl = document.getElementById("leadStatus");
      const deeplinkEl = document.getElementById("leadDeeplink");

      const openModal = (e) => {
        if (e && typeof e.preventDefault === "function") e.preventDefault();
        if (!modalOverlay) return;

        modalOverlay.style.display = "flex";
        setTimeout(() => modalOverlay.classList.add("active"), 10);
        document.body.style.overflow = "hidden";
      };

      const closeModal = () => {
        if (!modalOverlay) return;

        modalOverlay.classList.remove("active");
        document.body.style.overflow = "";
        setTimeout(() => { modalOverlay.style.display = "none"; }, 250);
      };

      // ✅ ВАЖНО: открытие модалки ТОЛЬКО через Alpine dispatch('open-waitlist')
      window.addEventListener("open-waitlist", openModal);

      // Закрытие по X
      if (closeModalBtn) closeModalBtn.addEventListener("click", closeModal);

      // Закрытие по клику на фон
      if (modalOverlay) {
        modalOverlay.addEventListener("click", (e) => {
          if (e.target === modalOverlay) closeModal();
        });
      }

      // Отправка формы
      if (form) {
        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = (document.getElementById("leadName")?.value || "").trim();
          const niche = (document.getElementById("leadNiche")?.value || "").trim();
          const rawContact = (document.getElementById("leadContact")?.value || "").trim();
          const normalizedContact = rawContact.replace(/\s+/g, "");

          const originalText = submitBtn ? submitBtn.innerText : "";

          if (statusEl) {
            statusEl.textContent = "";
            statusEl.style.color = "";
          }
          if (deeplinkEl) deeplinkEl.style.display = "none";

          // ✅ Более мягкая валидация
          const tgPattern = /^@[A-Za-z0-9_]{4,}$/;
          const tgLinkPattern = /^https?:\/\/t\.me\/[A-Za-z0-9_]{4,}$/i;
          const phonePattern = /^[+]?[0-9]{7,20}$/;

          const isTg = tgPattern.test(normalizedContact) || tgLinkPattern.test(normalizedContact);
          const isPhone = phonePattern.test(normalizedContact);

          if (!isTg && !isPhone) {
            if (statusEl) {
              statusEl.textContent = "Введите Telegram (@username или t.me/username) или номер телефона";
              statusEl.style.color = "#fbbf24";
            }
            return;
          }

          // tg если начинается с @ или это t.me ссылка
          const payload = {
            name,
            niche,
            tg: normalizedContact.startsWith("@") || tgLinkPattern.test(normalizedContact) ? normalizedContact : "",
            contact: normalizedContact
          };

          try {
            if (submitBtn) {
              submitBtn.innerText = "ОТПРАВКА...";
              submitBtn.disabled = true;
              submitBtn.style.opacity = "0.7";
            }

            const res = await fetch(API, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            const data = await res.json();
            if (!data.ok) throw new Error(data.error || "Ошибка");

            const waitlistContent = document.getElementById("waitlistContent");
            if (waitlistContent) {
              waitlistContent.innerHTML = `
                <div style="text-align:center; padding: 20px 0;">
                  <div style="font-size:3rem; margin-bottom:16px;">✅</div>
                  <h3 style="font-size:1.5rem; font-weight:900; color:#00f2ff; margin-bottom:16px; text-transform:uppercase;">
                    Заявка принята
                  </h3>
                  <p style="color:rgba(255,255,255,0.8); font-size:1rem; line-height:1.6; margin-bottom:32px;">
                    Чтобы Soff смог прислать уведомление о запуске и показать демо сервиса — нажмите кнопку «Перейти в Telegram» и нажмите Start.
                  </p>
                  <a href="${data.deeplink || 'https://t.me/AWMOS_bot'}" target="_blank" class="btn btn-main btn-block"
                     style="text-decoration:none; display:inline-block; box-sizing:border-box;">
                    ПЕРЕЙТИ В TELEGRAM
                  </a>
                </div>
              `;
            }

          } catch (err) {
            console.error(err);

            if (statusEl) {
              statusEl.textContent = "Ошибка отправки. Попробуйте ещё раз.";
              statusEl.style.color = "#ef4444";
            }

            if (submitBtn) {
              submitBtn.innerText = originalText || "СООБЩИТЬ МНЕ О ЗАПУСКЕ";
              submitBtn.disabled = false;
              submitBtn.style.opacity = "1";
            }
          }
        });
      }
    })();
  </script>

</body>

</html>
