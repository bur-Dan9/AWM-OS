<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWM OS - AI Marketing on Autopilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
        (() => {
            const API = "https://ai-bot-a3aj.onrender.com/api/leads/website";

            const modalOverlay = document.getElementById("modalOverlay");
            const closeModalBtn = document.getElementById("closeModal");
            const form = document.getElementById("waitlistForm");

            // Кнопки, которые открывают модалку:
            // ВАЖНО: добавь этим кнопкам data-open-waitlist="1"
            // (например на кнопку "Вступить в Waitlist")
            const openBtns = document.querySelectorAll('[data-open-waitlist="1"]');

            // --- helpers ---
            const openModal = (e) => {
                if (e) e.preventDefault();
                if (!modalOverlay) return;
                modalOverlay.style.display = "flex";
                document.body.style.overflow = "hidden";
                // если используешь классы анимации - можно добавить класс active
                modalOverlay.classList.add("active");
            };

            const closeModal = () => {
                if (!modalOverlay) return;
                modalOverlay.classList.remove("active");
                document.body.style.overflow = "";
                // небольшая задержка под анимацию
                setTimeout(() => { modalOverlay.style.display = "none"; }, 150);
            };

            // --- open ---
            openBtns.forEach(btn => btn.addEventListener("click", openModal));

            // --- close ---
            if (closeModalBtn) closeModalBtn.addEventListener("click", closeModal);
            if (modalOverlay) {
                modalOverlay.addEventListener("click", (e) => {
                    if (e.target === modalOverlay) closeModal();
                });
            }

            // --- submit ---
            if (form) {
                form.addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const nameEl = form.querySelector('[data-lead="name"]');
                    const nicheEl = form.querySelector('[data-lead="niche"]');
                    const contactEl = form.querySelector('[data-lead="contact"]');
                    const submitBtn = form.querySelector('button[type="submit"]');

                    const name = (nameEl?.value || "").trim();
                    const niche = (nicheEl?.value || "").trim();
                    const rawContact = (contactEl?.value || "").trim();
                    const contact = rawContact.replace(/\s+/g, "");

                    const tgLinkPattern = /^https?:\/\/t\.me\/[A-Za-z0-9_]{4,}$/i;
                    const tgAtPattern = /^@[A-Za-z0-9_]{4,}$/;
                    const phonePattern = /^[+]?[0-9]{7,20}$/;

                    const isTg = tgAtPattern.test(contact) || tgLinkPattern.test(contact);
                    const isPhone = phonePattern.test(contact);

                    if (!name || !niche || !contact) {
                        alert("Заполните имя, нишу и контакт.");
                        return;
                    }
                    if (!isTg && !isPhone) {
                        alert("Введите Telegram (@username или t.me/username) или номер телефона.");
                        return;
                    }

                    const payload = {
                        name,
                        niche,
                        tg: isTg ? contact : "",
                        contact
                    };

                    const originalText = submitBtn ? submitBtn.textContent : "";

                    try {
                        if (submitBtn) {
                            submitBtn.textContent = "ОТПРАВКА...";
                            submitBtn.disabled = true;
                            submitBtn.style.opacity = "0.75";
                        }

                        const res = await fetch(API, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload),
                        });

                        const data = await res.json();
                        if (!data.ok) throw new Error(data.error || "Ошибка");

                        // Success UI (не ломает дизайн — просто заменяем содержимое формы)
                        form.innerHTML = `
              <div class="text-center pt-2">
                <div class="text-4xl mb-4">✅</div>
                <h4 class="text-2xl font-bold text-text mb-3">Заявка принята</h4>
                <p class="text-sm text-muted-text leading-relaxed mb-6">
                  Чтобы Soff смогла прислать уведомление о запуске и показать демо сервиса — нажмите кнопку ниже и нажмите <b>Start</b>.
                </p>
                <a href="${data.deeplink || "https://t.me/AWMOS_bot"}" target="_blank"
                  class="w-full inline-flex items-center justify-center bg-gradient-to-r from-brand-purple to-brand-magenta text-white py-5 rounded-2xl font-bold text-lg shadow-lg shadow-brand-purple/20 hover:scale-[1.02] transition-all">
                  ПЕРЕЙТИ В TELEGRAM
                </a>
              </div>
            `;
                    } catch (err) {
                        console.error(err);
                        alert("Ошибка отправки. Попробуйте ещё раз.");
                        if (submitBtn) {
                            submitBtn.textContent = originalText || "СООБЩИТЬ МНЕ О ЗАПУСКЕ";
                            submitBtn.disabled = false;
                            submitBtn.style.opacity = "1";
                        }
                    }
                });
            }
        })();
    </script>
</body>

</html>
